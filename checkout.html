<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Tawhay Wellness</title>

    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body data-page="checkout">
    <div id="site-header"></div>

    <section class="page-hero">
        <style>
            .page-hero::before {
                background-image: linear-gradient(rgba(244, 231, 219, 0.40), rgba(244, 231, 219, 0.40)), url('assets/734(1) (1).png');
            }
        </style>
        <div class="page-hero-content">
            <h2>Checkout</h2>
        </div>
    </section>

    <main class="checkout-page">
        <section class="checkout-layout">
            <form id="checkout-form" class="billing-form">
                <h3>Billing details</h3>

                <div class="form-grid two-col">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required />
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="company">Company Name (Optional)</label>
                    <input type="text" id="company" />
                </div>

                <div class="form-group">
                    <label for="country">Country / Region</label>
                    <select id="country" required>
                        <option value="">Select Country</option>
                        <option value="Philippines">Philippines</option>
                        <option value="United States">United States</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="street">Street address</label>
                    <input type="text" id="street" required />
                </div>

                <div class="form-group">
                    <label for="city">Town / City</label>
                    <input type="text" id="city" required />
                </div>

                <div class="form-group">
                    <label for="province">Province</label>
                    <select id="province" required>
                        <option value="">Select Province</option>
                        <option value="Negros Occidental">Negros Occidental</option>
                        <option value="Metro Manila">Metro Manila</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="zip">ZIP code</label>
                    <input type="text" id="zip" required />
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" required />
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" required />
                </div>

                <div class="form-group">
                    <label for="notes">Additional information</label>
                    <textarea id="notes" rows="4"></textarea>
                </div>
            </form>

            <aside class="checkout-summary">
                <div class="checkout-summary-box">
                    <div class="summary-header">
                        <span>Product</span>
                        <span>Subtotal</span>
                    </div>

                    <div id="checkout-items" class="checkout-items"></div>

                    <div class="summary-divider"></div>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">Php 0.00</span>
                    </div>

                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="checkout-total">Php 0.00</span>
                    </div>

                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="Direct Bank Transfer" checked />
                            <span>Direct Bank Transfer</span>
                        </label>

                        <p class="payment-note">
                            Make your payment directly into our bank account. Please use your Order ID as the payment
                            reference.
                        </p>

                        <label class="payment-option">
                            <input type="radio" name="payment" value="Cash On Delivery" />
                            <span>Cash On Delivery</span>
                        </label>
                    </div>

                    <p class="privacy-note">
                        Your personal data will be used to support your experience throughout this website.
                    </p>

                    <button type="submit" form="checkout-form" class="primary-btn">Place order</button>
                </div>
            </aside>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="script.js"></script>
    <script src="cart-core.js"></script>
    <script src="layout.js"></script>
    <script src="checkout.js"></script>
</body>

</html>
