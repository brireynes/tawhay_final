<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Tawhay Wellness</title>

    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body data-page="auth">
    <div id="site-header"></div>

    <main class="auth-main">
        <div class="auth-card">
            <h2>Register</h2>

            <input id="regName" type="text" placeholder="Name" />
            <input id="regEmail" type="email" placeholder="Email" />
            <input id="regPassword" type="password" placeholder="Password" />

            <button onclick="registerUser()" class="auth-submit">Register</button>

            <p>
                Already have account?
                <a href="login.html" style="color:#4c6c4f; font-weight:700;">Login</a>
            </p>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="script.js"></script>
    <script src="cart-core.js"></script>
    <script src="layout.js"></script>
</body>

</html>
