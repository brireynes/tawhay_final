<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmation | Tawhay Wellness</title>

    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body data-page="checkout">
    <div id="site-header"></div>

    <section class="page-hero">
        <style>
            .page-hero::before {
                background-image: linear-gradient(rgba(244, 231, 219, 0.40), rgba(244, 231, 219, 0.40)), url('assets/734(1) (1).png');
            }
        </style>
        <div class="page-hero-content">
            <h2>Order Confirmation</h2>
        </div>
    </section>

    <main class="checkout-page">
        <section class="order-confirmation-wrap">
            <div class="order-confirmation-card">
                <div class="order-success-badge">✓</div>
                <h1>Thank you for your order</h1>
                <p class="order-success-text">
                    Your order has been placed successfully.
                </p>

                <div id="order-confirmation-content"></div>

                <div class="order-confirmation-actions">
                    <a href="shop.html" class="primary-btn">Continue Shopping</a>
                    <a href="cart.html" class="primary-btn">View Cart</a>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="script.js"></script>
    <script src="cart-core.js"></script>
    <script src="orders.js"></script>
    <script src="layout.js"></script>
    <script src="order-confirmation.js"></script>
</body>

</html>
